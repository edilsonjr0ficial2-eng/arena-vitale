<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Arena Vitale | Beach Tennis</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #000000;
            --card-color: #111111;
            --primary: #FFD700;
            --text-color: #ffffff;
            --hover: #E6C300;
            --instagram: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding-top: 80px; overflow-x: hidden; }

        /* --- NAVBAR --- */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--primary); z-index: 2000; padding: 10px 0; display: none; }
        .nav-container { max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo-img { max-height: 50px; cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: white; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }
        .nav-links a:hover { color: var(--primary); }
        .hamburger { display: none; font-size: 1.8rem; color: var(--primary); cursor: pointer; }

        /* --- SEÇÕES --- */
        .secao-conteudo { display: none; padding: 40px 20px; animation: fadeIn 0.4s ease; max-width: 1200px; margin: auto; }
        #tela-inicial { display: none; height: 80vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('quadra1.jpeg') center/cover; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- AUTH --- */
        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: url('quadra1.jpeg') center/cover; position: fixed; top: 0; left: 0; width: 100%; z-index: 3000; }
        .auth-box { background: rgba(17, 17, 17, 0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 90%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 50px; text-align: center; font-size: 1rem; }
        .auth-btn { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .auth-btn:hover { background: var(--hover); transform: scale(1.02); }

        /* --- SUPER OITO --- */
        .grid-super8 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .card-super8 { background: var(--card-color); padding: 25px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; transition: 0.3s; }
        .card-super8:hover { transform: translateY(-5px); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .card-super8 h3 { color: var(--primary); margin-bottom: 15px; font-size: 1.3rem; }
        .vagas-badge { background: #222; color: var(--primary); padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; border: 1px solid var(--primary); display: inline-block; margin-bottom: 20px; }

        /* --- FLUTUANTES --- */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .ig-float { position: fixed; bottom: 100px; right: 30px; background: var(--instagram); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-decoration: none; }
        .ig-float i { color: white; font-size: 32px; }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 1100px) {
            .nav-links { position: absolute; top: 100%; left: 0; width: 100%; background: #111; flex-direction: column; align-items: center; padding: 20px 0; display: none; border-bottom: 1px solid var(--primary); }
            .nav-links.active { display: flex; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <div id="tela-auth" class="auth-container">
        <div id="box-login" class="auth-box">
            <img src="logo2.png" alt="Logo" style="max-width:150px; margin-bottom:20px;">
            <h2 style="color:var(--primary); margin-bottom:20px; letter-spacing: 2px;">LOGIN</h2>
            <input type="tel" id="loginPhone" class="auth-input" placeholder="Telefone">
            <input type="password" id="loginPass" class="auth-input" placeholder="Senha">
            <button class="auth-btn" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <header class="navbar" id="navPrincipal">
        <div class="nav-container">
            <img src="logo.jpg" class="nav-logo-img" onclick="navegarPara('tela-inicial')">
            <div class="hamburger" onclick="toggleMenu()">☰</div>
            <ul class="nav-links" id="navLinks">
                <li><a onclick="navegarPara('tela-agendamento')">Agendar</a></li>
                <li><a onclick="navegarPara('tela-superoito')">Super Oito</a></li>
                <li><a onclick="navegarPara('tela-times')">Times</a></li>
                <li><a onclick="fazerLogout()" style="color:red;">Sair</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section id="tela-inicial">
            <img src="logo2.png" style="max-width:80%; width:500px; margin-bottom:20px;">
            <button class="auth-btn" style="max-width:300px;" onclick="navegarPara('tela-agendamento')">Ver Horários</button>
        </section>

        <section id="tela-superoito" class="secao-conteudo">
            <h2 style="text-align:center; color:var(--primary); margin-bottom:10px; font-size: 2rem;">SUPER OITO</h2>
            <p style="text-align:center; color:#aaa; margin-bottom:30px;">Power Launch 🚀</p>
            <div class="grid-super8">
                <div class="card-super8">
                    <h3>Principiante</h3>
                    <div class="vagas-badge">8 VAGAS</div>
                    <button class="auth-btn" onclick="inscrever('Principiante')">Inscrição</button>
                </div>
                <div class="card-super8">
                    <h3>Iniciante Feminino D</h3>
                    <div class="vagas-badge">8 VAGAS</div>
                    <button class="auth-btn" onclick="inscrever('Iniciante Feminino D')">Inscrição</button>
                </div>
                <div class="card-super8">
                    <h3>Iniciante Masculino D</h3>
                    <div class="vagas-badge">8 VAGAS</div>
                    <button class="auth-btn" onclick="inscrever('Iniciante Masculino D')">Inscrição</button>
                </div>
            </div>
        </section>

        <section id="tela-agendamento" class="secao-conteudo">
            <h2 style="text-align:center; color:var(--primary); margin-bottom:20px;">AGENDAMENTO</h2>
            <div style="background: var(--card-color); padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center;">
                <p>O sistema de agendamento está ativo.</p>
                <p style="font-size: 0.9rem; color: #777; margin-top: 10px;">Consulte horários e realize sua reserva.</p>
                <button class="auth-btn" style="margin-top: 20px;" onclick="location.reload()">Atualizar Agenda</button>
            </div>
        </section>

        <section id="tela-times" class="secao-conteudo">
            <h2 style="text-align:center; color:var(--primary); margin-bottom:20px;">GERADOR DE TIMES</h2>
            <div style="background: var(--card-color); padding: 20px; border-radius: 20px; border: 1px solid #333;">
                <input type="text" id="playerNames" class="auth-input" placeholder="Nomes separados por vírgula">
                <button class="auth-btn" onclick="alert('Funcionalidade de sorteio ativa!')">Sortear</button>
            </div>
        </section>
    </main>

    <a href="https://wa.me/5588988229008" class="wa-float" id="waFloat" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
    </a>
    
    <a href="https://www.instagram.com/arenavitale/" class="ig-float" id="igFloat" target="_blank">
        <i class="fab fa-instagram"></i>
    </a>

    <script>
        // --- NAVEGAÇÃO ---
        function navegarPara(id) {
            // Esconde todas as seções
            document.querySelectorAll('.secao-conteudo, #tela-inicial').forEach(s => s.style.display = 'none');
            
            // Mostra a seção desejada
            const alvo = document.getElementById(id);
            if(id === 'tela-inicial') {
                alvo.style.display = 'flex';
            } else {
                alvo.style.display = 'block';
            }
            
            // Fecha menu mobile se estiver aberto
            document.getElementById('navLinks').classList.remove('active');
            window.scrollTo(0,0);
        }

        function toggleMenu() { 
            document.getElementById('navLinks').classList.toggle('active'); 
        }

        // --- INSCRIÇÃO SUPER OITO ---
        function inscrever(categoria) {
            const msg = `Olá! Gostaria de realizar minha inscrição no *Super Oito Power Launch* para a categoria: *${categoria}*.`;
            window.open(`https://wa.me/5588988229008?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- AUTH SIMULADO (Substitua pelo seu Fetch original da Planilha) ---
        function fazerLogin() {
            const tel = document.getElementById('loginPhone').value;
            const pass = document.getElementById('loginPass').value;

            if(!tel || !pass) {
                alert("Preencha os campos de acesso.");
                return;
            }

            // Interface pós-login
            document.getElementById('tela-auth').style.display = 'none';
            document.getElementById('navPrincipal').style.display = 'block';
            document.getElementById('waFloat').style.display = 'flex';
            document.getElementById('igFloat').style.display = 'flex';
            navegarPara('tela-inicial');
        }

        function fazerLogout() { 
            localStorage.clear(); 
            location.reload(); 
        }

        // Limpeza automática de cache zumbi de Service Workers antigos
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
</body>
</html>
